name: Pull Request Checks

on: pull_request

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm i

      - name: Build
        run: npm run build:prod

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test