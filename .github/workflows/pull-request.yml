name: Pull Request Checks
on: pull_request

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx ng build scalecloud --configuration production

      - name: Test
        run: npx ng test --watch=false --browsers=ChromeHeadless