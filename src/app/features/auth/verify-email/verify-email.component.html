<mat-card>
  <mat-card-title>Thank You for Registering</mat-card-title>
  <mat-card-content>
    @if (auth.user()) {
      <div>
        <p>
          We have sent a confirmation E-Mail to: <strong>{{ auth.user()?.email }}</strong>.
        </p>
        <p>
          Please check your E-Mail and click on the link to verify your E-Mail
          address.
        </p>
      </div>
    }
    <div class="flex-container">
      <div class="flex-item">
        <button
          (click)="proceedToCheckout()"
          mat-raised-button
          color="primary"
          [disabled]="isProceedToCheckoutLoading()"
        >
          @if (isProceedToCheckoutLoading()) {
            <mat-icon>
              <mat-spinner color="accent" style="width: 100%; height: 100%;"></mat-spinner>
            </mat-icon>
          }
          Proceed to Checkout
        </button>
      </div>
      <div class="flex-item">
        <button
          [disabled]="isResendDisabled()"
          (click)="sendVerificationMail()"
          mat-stroked-button
        >
          {{ resendButtonText() }}
        </button>
      </div>
    </div>
  </mat-card-content>
</mat-card>
