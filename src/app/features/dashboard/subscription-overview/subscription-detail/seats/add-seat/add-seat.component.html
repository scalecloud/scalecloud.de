<mat-card>
  <mat-card-title>Invite user</mat-card-title>
  <mat-card-content>
    <mat-form-field appearance="fill">
      <mat-label>E-Mail</mat-label>
      <input
        type="email"
        matInput
        id="invite-email"
        aria-label="E-Mail"
        placeholder="name@example.com"
        [formControl]="email"
        required
      />
      @if (email.invalid && email.touched) {
        <mat-error>{{ getEmailErrorMessage() }}</mat-error>
      }
    </mat-form-field>

    <mat-label>Select roles</mat-label>
    <mat-chip-listbox multiple class="mat-mdc-chip-set-stacked">
      @for (role of inviteUserRoles; track role) {
        <mat-chip-option
          [selected]="selectedRoles().includes(role)"
          (click)="toggleRoleSelection(role)"
          (keydown)="handleKeyDown($event, role)"
          [matTooltip]="roleDescriptions[role]"
        >
          {{ role }}
        </mat-chip-option>
      }
    </mat-chip-listbox>

    <div class="flex-container">
      <div class="flex-item">
        <button
          mat-raised-button
          color="primary"
          (click)="addSeat()"
          [disabled]="isSubmitting()"
          aria-label="Send invitation"
        >
          @if (isSubmitting()) {
            <mat-spinner diameter="18" />
          } @else {
            Invite
          }
        </button>
      </div>
    </div>
  </mat-card-content>
</mat-card>
