<mat-dialog-content>
  <p>Are you sure you want to cancel your subscription?</p>
</mat-dialog-content>
<mat-dialog-actions align="center">
  <button mat-stroked-button color="primary" [mat-dialog-close]="true" data-testid="confirm-cancel-btn">Cancel Subscription</button>
  <button mat-stroked-button mat-dialog-close data-testid="dismiss-btn">Cancel</button>
</mat-dialog-actions>
