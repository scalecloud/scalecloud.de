<div class="page-container">
  <mat-card>
    <mat-card-title>Reset Password</mat-card-title>
    <mat-card-content>
      <p>Please enter your E-Mail address to request a password reset.</p>
      <mat-form-field appearance="fill">
        <mat-label id="forgot-password-email-label">E-Mail:</mat-label>
        <input type="email" matInput id="forgot-password-email" placeholder="E-Mail" aria-labelledby="forgot-password-email-label" [formControl]="email" required>
        @if (email.invalid && email.touched) {
          <mat-error>{{getErrorMessageEMail()}}</mat-error>
        }
      </mat-form-field>
      <div class="flex-container">
        <div class="flex-item">
          <button [disabled]="clicked()" (click)="forgotPassword()" mat-raised-button color="primary">
            {{buttonText()}}
          </button>
        </div>
        <div class="flex-item">
          <button routerLink="/login" mat-stroked-button>Login</button>
        </div>
      </div>
    </mat-card-content>
  </mat-card>
</div>
