@let q = quantity();

<div class="quantity-container">
    <button
        type="button"
        aria-label="Decrease quantity"
        (click)="decrement()"
        [disabled]="q <= min">
        &minus;
    </button>

    <input
        matInput
        id="quantity-input"
        aria-label="Quantity"
        type="number"
        [attr.min]="min"
        [attr.max]="max"
        required
        [formControl]="quantityControl">

    <button
        type="button"
        aria-label="Increase quantity"
        (click)="increment()"
        [disabled]="q >= max">
        +
    </button>
</div>
